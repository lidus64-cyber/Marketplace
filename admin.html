<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #2c3e50;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    margin: 10px 0;
    text-decoration: none;
}

.main {
    flex: 1;
    padding: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.add-btn { background: #03f5b4; color: white; }
.edit-btn { background: #096daf; color: white; }
.delete-btn { background: #000000; color: white; }

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Admin</h2>
    <a href="#">Dashboard</a>
    <a href="#">Products</a>
</div>

<div class="main">

    <!-- Add Product -->
    <div class="card">
        <h2>Add Product</h2>
        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price">
        <input type="file" id="image">

        <button class="add-btn" onclick="addProduct()">Add Product</button>
    </div>

    <!-- Search -->
    <div class="card">
        <input type="text" id="search" placeholder="Search product..." onkeyup="displayProducts()">
    </div>

    <!-- Table -->
    <div class="card">
        <h2>Product List</h2>
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>
let products = [];
let editIndex = -1;

function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const imageInput = document.getElementById("image");

    if (!name || !price) {
        alert("Fill all fields");
        return;
    }

    const reader = new FileReader();

    reader.onload = function() {
        const image = reader.result;

        if (editIndex === -1) {
            products.push({ name, price, image });
        } else {
            products[editIndex] = { name, price, image };
            editIndex = -1;
        }

        clearForm();
        displayProducts();
    };

    if (imageInput.files[0]) {
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        alert("Select image");
    }
}

function displayProducts() {
    const search = document.getElementById("search").value.toLowerCase();
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    products
        .filter(p => p.name.toLowerCase().includes(search))
        .forEach((p, i) => {
            table.innerHTML += `
                <tr>
                    <td><img src="${p.image}"></td>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td>
                        <button class="edit-btn" onclick="editProduct(${i})">Edit</button>
                        <button class="delete-btn" onclick="deleteProduct(${i})">Delete</button>
                    </td>
                </tr>
            `;
        });
}

function editProduct(i) {
    document.getElementById("name").value = products[i].name;
    document.getElementById("price").value = products[i].price;
    editIndex = i;
}

function deleteProduct(i) {
    products.splice(i, 1);
    displayProducts();
}

function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
}
</script>

</body>
</html>
