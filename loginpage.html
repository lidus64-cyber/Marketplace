<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketPlane Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-container h2{
text-align:center;
margin-bottom:25px;
}

.input-box{
margin-bottom:20px;
}

.input-box label{
display:block;
margin-bottom:6px;
font-size:14px;
}

.input-box input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
outline:none;
}

.input-box input:focus{
border-color:#4facfe;
}

button{
width:100%;
padding:12px;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2f8ef5;
}

.extra{
text-align:center;
margin-top:15px;
font-size:14px;
}

.extra a{
text-decoration:none;
color:#4facfe;
}

</style>
</head>

<body>

<div class="login-container">

<h2>Login To MarketPlace</h2>

<form>

<div class="input-box">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<button type="submit">Login</button>

<div class="extra">
<p>Don't have an account? <a href="#">Sign up</a></p>
</div>

</form>

</div>

</body>
</html>
