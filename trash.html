<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Marketplace</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    header {
        background: #1f2937;
        color: pink;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header input {
        padding: 8px;
        width: 250px;
        border-radius: 6px;
        border: none;
    }
.container {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .card {
        background: pink;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        transition: 0.2s;
    }

    .card:hover {
        transform: translateY(-3px);
    }

    .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 8px;
    }

    .title {
        font-size: 18px;
  		margin: 10px 0 5px;
        font-weight: bold;
    }

    .price {
        color: #16a34a;
        font-size: 16px;
        margin-bottom: 10px;
    }

    button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
    }

    button:hover {
        background: #1d4ed8;
    }
</style>
</head>
<body>

<header>
    <h2>Marketplace</h2>
    <input type="text" placeholder="Search products...">
</header>
<div class="container">

<div class="card">
    <img src="https://picsum.photos/300/200?1">
    <div class="title">Product One</div>
    <div class="priceqq">$25</div>
    <button class="item-button">Add to Cart</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/200?2">
    <div class="title">Product Two</div>
    <div class="price">$40</div>
    <button class="item-button">Add to Cart</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/200?3">
    <div class="title">Product Three</div>
    <div class="price">$15</div>
    <button class="item-button">Add to Cart</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/200?4">
    <div class="title">Product Four</div>
    <div class="price">$60</div>
    <button>Add to Cart</button>
</div>

</div>
  </body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin page</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 15px;
            color: pink;
            background-color: #98A869 ;
        }
        input{
            padding: 6px;
            margin:3px;
            width: 50%;
            border-radius: 12px;
            border-color: gray;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h1>Add product</h1>
    <input type="text" id="name" placeholder="Product name"><br><br>
    <input type="number" id="price" placeholder="Price"><br><br>
    <input id="image" placeholder="image-url"><br><br>

    <button onclick="addproduct()">Add Product</button>



    <script>
        function addproduct()
        {
        localStorage.setItem("name", document.getElementById("name").value);
        localStorage.setItem("price", document.getElementById("price").value);
        localStorage.setItem("image", document.getElementById("image").value);
        }
        </script>

</body>
</html>
