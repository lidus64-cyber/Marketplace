<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Center</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .help-item {
        background: #f5f5f5;
        margin: 10px 0;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .help-item:hover {
        background: #667eea;
        color: #fff;
        transform: translateY(-3px);
    }

    .contact {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
    }

    .contact a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
    }

    .contact a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Help Center</h2>

    <div class="help-item">Orders & Shipping</div>
    <div class="help-item">Returns & Refunds</div>
    <div class="help-item">Payments</div>
    <div class="help-item">Account Help</div>
    <div class="help-item">FAQs</div>

    <div class="contact">
        Need more help? <br>
        <a href="#">Contact Us</a>
    </div>
</div>

</body>
</html>
